[phases.setup]
nixPkgs = [
    'python3', 'nodejs_23',
    'pango', 'cairo', 'gdk-pixbuf', 'glib',
    'gobject-introspection', 'fontconfig', 'harfbuzz',
    'pkg-config', 'shared-mime-info', 'libffi'
]

[phases.install]
cmds = [
    'python3 -m venv .venv',
    '.venv/bin/pip install --upgrade pip',
    '.venv/bin/pip install -r requirements.txt',
    'cd frontend && npm install --legacy-peer-deps',
    'npm install -g katex'
]

[phases.build]
cmds = ['cd frontend && npm run build']

[variables]
XDG_DATA_DIRS = "/root/.nix-profile/share:/nix/var/nix/profiles/default/share:/usr/share:/usr/local/share"
GI_TYPELIB_PATH = "/root/.nix-profile/lib/girepository-1.0:/nix/var/nix/profiles/default/lib/girepository-1.0"

[start]
cmd = 'export LD_LIBRARY_PATH="/root/.nix-profile/lib:/nix/var/nix/profiles/default/lib:$LD_LIBRARY_PATH" && . .venv/bin/activate && cd backend && python app.py'
