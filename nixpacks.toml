[phases.setup]
nixPkgs = [
    'python3', 'nodejs_23',
    'pango', 'cairo', 'gdk-pixbuf', 'glib',
    'gobject-introspection', 'fontconfig', 'harfbuzz',
    'pkg-config', 'shared-mime-info', 'libffi'
]

[phases.install]
cmds = [
    'python3 -m venv .venv',
    '.venv/bin/pip install --upgrade pip',
    '.venv/bin/pip install -r requirements.txt',
    'cd frontend && npm install --legacy-peer-deps',
    'npm install -g katex'
]

[phases.build]
cmds = [
    'cd frontend && npm run build',
    'find /nix/store -maxdepth 2 -type d -name lib 2>/dev/null | sort -u > /app/.nix-lib-dirs && echo "Found $(wc -l < /app/.nix-lib-dirs) nix lib dirs" && grep -l "libgobject-2.0.so" $(cat /app/.nix-lib-dirs) 2>/dev/null || true'
]

[variables]
XDG_DATA_DIRS = "/root/.nix-profile/share:/nix/var/nix/profiles/default/share:/usr/share:/usr/local/share"
GI_TYPELIB_PATH = "/root/.nix-profile/lib/girepository-1.0:/nix/var/nix/profiles/default/lib/girepository-1.0"

[start]
cmd = 'export LD_LIBRARY_PATH="$(paste -sd: /app/.nix-lib-dirs):/root/.nix-profile/lib:$LD_LIBRARY_PATH" && export GDK_PIXBUF_MODULE_FILE="$(find /nix/store -name loaders.cache -path "*/gdk-pixbuf*" 2>/dev/null | head -1)" && . .venv/bin/activate && cd backend && python app.py'
