[phases.setup]
nixPkgs = ['python310', 'nodejs-18_x']

[phases.install]
cmds = [
    'python3 -m pip install --upgrade pip',
    'python3 -m pip install -r requirements.txt',
    'cd frontend && npm install --legacy-peer-deps && npm run build && cd ..'
]

[start]
cmd = 'cd backend && python3 app.py'
