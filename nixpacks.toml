[phases.setup]
nixPkgs = [
    'python3', 'nodejs_23',
    'pango', 'cairo', 'gdk-pixbuf', 'glib',
    'gobject-introspection', 'fontconfig', 'harfbuzz',
    'pkg-config', 'shared-mime-info', 'libffi'
]

[phases.install]
cmds = [
    'python3 -m venv .venv',
    '.venv/bin/pip install --upgrade pip',
    '.venv/bin/pip install -r requirements.txt',
    'cd frontend && npm install --legacy-peer-deps',
    'npm install -g katex'
]

[phases.build]
cmds = [
    'cd frontend && npm run build',
    'for lib in libgobject-2.0 libglib-2.0 libgio-2.0 libgthread-2.0 libpango-1.0 libpangocairo-1.0 libpangoft2-1.0; do for f in $(find /nix/store -maxdepth 3 -name "${lib}.so*" -not -name "*.py" -not -name "*.stp" 2>/dev/null); do ln -sf "$f" /root/.nix-profile/lib/ 2>/dev/null || true; done; done',
    'echo "/root/.nix-profile/lib" > /etc/ld.so.conf.d/nix.conf && ldconfig 2>/dev/null || true'
]

[variables]
XDG_DATA_DIRS = "/root/.nix-profile/share:/nix/var/nix/profiles/default/share:/usr/share:/usr/local/share"
GI_TYPELIB_PATH = "/root/.nix-profile/lib/girepository-1.0:/nix/var/nix/profiles/default/lib/girepository-1.0"

[start]
cmd = 'export LD_LIBRARY_PATH="/root/.nix-profile/lib:$LD_LIBRARY_PATH" && . .venv/bin/activate && cd backend && python app.py'
